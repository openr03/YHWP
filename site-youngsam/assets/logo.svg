<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="YHWP">
  <!--
    YHWP 로고 v3 — 완전한 한글 문자 "한" 으로 정체성 강화
    ㅎ + ᅡ + ㄴ 의 3 자모를 한글 음절 블록 구조 그대로 기하학 형태로 배치.
    배경: 깊은 인디고 그라데이션 (#1f2e4a → #0a1220) — 차분하고 신뢰감.
    하단 골드 한 줄: 한국 전통 단청 옻칠 모티프 + 영삼넷 brand 시그니처.
  -->
  <defs>
    <linearGradient id="yhwp-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#27395c"/>
      <stop offset="55%"  stop-color="#162640"/>
      <stop offset="100%" stop-color="#0a1220"/>
    </linearGradient>
    <radialGradient id="yhwp-glow" cx="0.28" cy="0.18" r="0.68">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="yhwp-ink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d4def0"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="1024" rx="220" fill="url(#yhwp-bg)"/>
  <rect width="1024" height="1024" rx="220" fill="url(#yhwp-glow)"/>
  <rect x="44" y="44" width="936" height="936" rx="196"
        fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="2"/>

  <!--
    한 문자 — 한글 음절 블록 구조 (좌상=초성 ㅎ, 우상=중성 ᅡ, 하단=종성 ㄴ)
    1024 캔버스에 약 690 폭으로 글자 중앙 배치.
    좌상단 시작점 (168, 200), 종성 ㄴ 까지 하단 (824) 끝.
  -->
  <g fill="url(#yhwp-ink)">
    <!-- ㅎ : 가로 짧은획 (264px) + 점 + 원 — 좌상단 -->
    <rect x="168" y="218" width="264" height="56" rx="28"/>
    <rect x="288" y="278" width="32" height="56" rx="16"/>
  </g>
  <circle cx="304" cy="400" r="76"
          fill="none" stroke="url(#yhwp-ink)" stroke-width="52"/>

  <!-- ᅡ : 세로 긴 + 우측 짧은 가로 — 우상단 (중성) -->
  <g fill="url(#yhwp-ink)">
    <rect x="556" y="200" width="56" height="350" rx="28"/>
    <rect x="612" y="358" width="160" height="56" rx="28"/>
  </g>

  <!-- ㄴ : 세로 + 가로 L 자 — 하단 전체 (종성) -->
  <g fill="url(#yhwp-ink)">
    <rect x="168" y="610" width="56" height="216" rx="28"/>
    <rect x="168" y="770" width="688" height="56" rx="28"/>
  </g>

  <!-- 하단 골드 시그니처 라인 — 단청 옻칠 모티프 -->
  <rect x="362" y="900" width="300" height="6" rx="3"
        fill="#d4a36a" opacity="0.6"/>
</svg>
