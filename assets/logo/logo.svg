<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="YHWP">
  <!--
    YHWP 로고 v2 — 훈민정음 영감 모던 미니멀 (refined)
    한글 자모 ㅎ (HWP 의 H, 한글의 첫 자모).
    개선: 3-stop 청록 그라데이션 + 상단 하이라이트 + 깊이감 안쪽 보더.
    낙관 제거 (작은 사이즈에서 noise) → 깔끔한 단일 모티프.
  -->
  <defs>
    <linearGradient id="yhwp-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#3a7196"/>
      <stop offset="55%"  stop-color="#1d4660"/>
      <stop offset="100%" stop-color="#0a2030"/>
    </linearGradient>
    <radialGradient id="yhwp-glow" cx="0.3" cy="0.18" r="0.7">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="yhwp-ink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cfd9e7"/>
    </linearGradient>
    <filter id="yhwp-soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- 배경: 둥근 사각형 + 그라데이션 -->
  <rect width="1024" height="1024" rx="220" fill="url(#yhwp-bg)"/>
  <!-- 상단 하이라이트 -->
  <rect width="1024" height="1024" rx="220" fill="url(#yhwp-glow)"/>

  <!-- 안쪽 미세 보더 (depth) -->
  <rect x="44" y="44" width="936" height="936" rx="196"
        fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="2"/>

  <!-- ㅎ : 가로획 + 점 + 원 (3-stroke 천지인 구조) -->
  <g>
    <!-- 그림자 (소프트 깊이감) -->
    <g fill="rgba(0,0,0,0.18)" filter="url(#yhwp-soft-shadow)" transform="translate(0, 6)">
      <rect x="232" y="232" width="560" height="92" rx="46"/>
      <rect x="486" y="330" width="52" height="98" rx="26"/>
      <circle cx="512" cy="680" r="200" fill="none" stroke="rgba(0,0,0,0.18)" stroke-width="92"/>
    </g>
    <!-- 본 글자 -->
    <g fill="url(#yhwp-ink)">
      <rect x="232" y="232" width="560" height="92" rx="46"/>
      <rect x="486" y="330" width="52" height="98" rx="26"/>
    </g>
    <circle cx="512" cy="680" r="200"
            fill="none" stroke="url(#yhwp-ink)" stroke-width="92"/>
  </g>

  <!-- 하단 미세 골드 라인 — 한국 전통 단청 옻칠 모티프 -->
  <rect x="332" y="888" width="360" height="6" rx="3"
        fill="#d4a36a" opacity="0.55"/>
</svg>
